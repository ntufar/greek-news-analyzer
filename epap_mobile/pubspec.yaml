name: epap_mobile
description: "EPAP - Greek News Propaganda Analysis Platform"
publish_to: 'none'
version: 0.0.7+7

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.0
  http: ^1.2.0
  receive_sharing_intent: ^1.8.0
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  flutter_markdown: ^0.7.0
  url_launcher: ^6.2.0
  share_plus: ^10.0.0
  intl: ^0.19.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#1e3c72"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true

name: Mobile Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: epap_mobile

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true

    - name: Cache pub dependencies
      uses: actions/cache@v4
      with:
        path: epap_mobile/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('epap_mobile/pubspec.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: Install dependencies
      run: flutter pub get

    - name: Run tests
      run: flutter test

    - name: Decode release keystore
      run: |
        echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/release.keystore

    - name: Create keystore.properties
      run: |
        cat > android/keystore.properties << EOF
        storeFile=release.keystore
        storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
        keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
        keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
        EOF

    - name: Build release APK
      run: flutter build apk --release

    - name: Upload APK to release
      uses: softprops/action-gh-release@v2
      with:
        files: epap_mobile/build/app/outputs/flutter-apk/app-release.apk

  ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: epap_mobile

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true

    - name: Cache pub dependencies
      uses: actions/cache@v4
      with:
        path: epap_mobile/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('epap_mobile/pubspec.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: Install dependencies
      run: flutter pub get

    - name: Run tests
      run: flutter test

    - name: Build iOS (no codesign)
      run: flutter build ios --release --no-codesign

    - name: Zip iOS build
      run: |
        cd build/ios/iphoneos
        zip -r Runner.app.zip Runner.app

    - name: Upload iOS build to release
      uses: softprops/action-gh-release@v2
      with:
        files: epap_mobile/build/ios/iphoneos/Runner.app.zip

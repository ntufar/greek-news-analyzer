<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ΕΠΑΠ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 180px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #f4f6fb;
      color: #1a2340;
    }

    .header {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header img { width: 28px; height: 28px; border-radius: 6px; }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header-text p {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 1px;
    }

    .body { padding: 14px 16px; }

    .url-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: white;
      border: 1px solid #dde3f0;
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 12px;
    }

    .url-icon { font-size: 14px; flex-shrink: 0; }

    .url-text {
      font-size: 11px;
      color: #4a5568;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .btn-analyze {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-analyze:hover { opacity: 0.9; }
    .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: none;
      text-align: center;
      padding: 20px 0 8px;
      color: #2a5298;
      font-size: 12px;
    }

    .spinner.visible { display: block; }

    .spinner-ring {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid #dde3f0;
      border-top-color: #2a5298;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .results { display: none; margin-top: 12px; }
    .results.visible { display: block; }

    .score-card {
      background: white;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      border: 1px solid #dde3f0;
      margin-bottom: 10px;
    }

    .score-label { font-size: 11px; color: #718096; margin-bottom: 4px; }

    .score-value {
      font-size: 42px;
      font-weight: 800;
      line-height: 1;
    }

    .score-value.high { color: #22863a; }
    .score-value.mid  { color: #e6a817; }
    .score-value.low  { color: #d63031; }

    .score-bar-track {
      height: 6px;
      background: #edf2f7;
      border-radius: 4px;
      margin: 8px 0 4px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .score-bar-fill.high { background: #22863a; }
    .score-bar-fill.mid  { background: #e6a817; }
    .score-bar-fill.low  { background: #d63031; }

    .score-desc { font-size: 11px; color: #718096; }

    .analysis-box {
      background: white;
      border: 1px solid #dde3f0;
      border-radius: 10px;
      padding: 12px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.6;
      color: #2d3748;
    }

    .analysis-box h3 {
      font-size: 12px;
      font-weight: 700;
      color: #1e3c72;
      margin: 10px 0 4px;
    }

    .analysis-box h3:first-child { margin-top: 0; }

    .analysis-box p { margin-bottom: 4px; }

    .analysis-box ul {
      padding-left: 14px;
      margin-bottom: 4px;
    }

    .analysis-box li { margin-bottom: 2px; }

    .error-box {
      display: none;
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 8px;
      padding: 10px 12px;
      color: #c53030;
      font-size: 12px;
      margin-top: 10px;
    }

    .error-box.visible { display: block; }

    .open-full {
      display: block;
      text-align: center;
      margin-top: 10px;
      font-size: 11px;
      color: #2a5298;
      text-decoration: none;
      padding: 6px;
      border: 1px solid #bee3f8;
      border-radius: 6px;
      background: #ebf8ff;
    }

    .open-full:hover { background: #bee3f8; }

    .source-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }

    .source-row label {
      font-size: 11px;
      color: #718096;
      flex-shrink: 0;
    }

    .source-input {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #dde3f0;
      border-radius: 6px;
      font-size: 12px;
      background: white;
      color: #1a2340;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-48.png" alt="ΕΠΑΠ">
    <div class="header-text">
      <h1>ΕΠΑΠ</h1>
      <p>Ανάλυση Παραπληροφόρισης</p>
    </div>
  </div>

  <div class="body">
    <div class="url-row">
      <span class="url-icon">🔗</span>
      <span class="url-text" id="currentUrl">Φόρτωση...</span>
    </div>

    <div class="source-row">
      <label for="sourceInput">Πηγή:</label>
      <input type="text" id="sourceInput" class="source-input"
             placeholder="π.χ. ΕΡΤ, ΣΚΑΪ, kathimerini.gr">
    </div>

    <button class="btn-analyze" id="analyzeBtn">
      🔍 Ανάλυση Σελίδας
    </button>

    <div class="spinner" id="spinner">
      <div class="spinner-ring"></div>
      <div>Ανάλυση σε εξέλιξη...</div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="results" id="results">
      <div class="score-card">
        <div class="score-label">Βαθμολογία Αξιοπιστίας</div>
        <div class="score-value" id="scoreValue">—</div>
        <div class="score-bar-track">
          <div class="score-bar-fill" id="scoreBar" style="width:0%"></div>
        </div>
        <div class="score-desc" id="scoreDesc"></div>
      </div>
      <div class="analysis-box" id="analysisBox"></div>
      <a class="open-full" id="openFull" href="#" target="_blank">
        Άνοιγμα πλήρους ανάλυσης στο epap.vercel.app ↗
      </a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
